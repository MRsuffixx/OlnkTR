allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  prisma: true
  sharp: true
  unrs-resolver: true

# Never mutate or delay `pnpm start` (or another script) with an implicit install.
# CI uses a frozen lockfile; developers run an explicit, reviewable install.
verifyDepsBeforeRun: false

# Auth.js v5 currently declares Nodemailer 7 even though these exact releases
# only use the createTransport/sendMail API retained by the patched v9 line.
peerDependencyRules:
  allowedVersions:
    '@auth/core@0.41.2>nodemailer': '9.0.3'
    'next-auth@5.0.0-beta.31>nodemailer': '9.0.3'

overrides:
  '@hono/node-server': '1.19.13'
  'postman-request>qs': '6.15.3'
  'postman-request>uuid': '11.1.1'
  'next>postcss': '8.5.20'

minimumReleaseAgeExclude:
  - '@prisma/adapter-pg@7.9.0'
  - '@prisma/client-runtime-utils@7.9.0'
  - '@prisma/client@7.9.0'
  - '@prisma/debug@7.9.0'
  - '@prisma/driver-adapter-utils@7.9.0'
  - '@prisma/config@7.9.0'
  - '@prisma/engines@7.9.0'
  - '@prisma/fetch-engine@7.9.0'
  - '@prisma/get-platform@7.9.0'
  - prisma@7.9.0
