name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: olnk_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d olnk_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/olnk_test
      AUTH_SECRET: ci-only-auth-secret-that-is-at-least-32-characters
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
      CRON_SECRET: ci-only-cron-secret-that-is-long-enough
      TRUSTED_IP_HEADER: none
      RUN_DATABASE_E2E: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm db:migrate
      - run: pnpm check
      - run: pnpm test
      - run: pnpm audit --prod --audit-level high
      - run: pnpm build
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
